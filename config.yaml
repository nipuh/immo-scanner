# Immo-Scanner Freiburg - Konfiguration

search:
  location: "Freiburg im Breisgau"
  radius_km: 30
  rooms_min: 1
  rooms_max: 4
  price_max: 440000  # 4 Zimmer * 110k = 440k max
  property_types:
    - "Wohnung"
  exclude:
    - "Erbbaurecht"
    - "Zwangsversteigerung"
    - "Neubau"
    - "Erstbezug"

# Kaufpreisgrenze pro Zimmer
max_preis_pro_zimmer: 110000

# Bierdeckelrechnung Parameter
bierdeckel:
  # Normalvermietung
  miete_normal_qm: 12.0
  min_rendite_normal: 5.0

  # WG-Vermietung
  miete_wg_zimmer: 420.0
  min_rendite_wg: 6.0

  # Kaufnebenkosten Baden-Wuerttemberg
  nk_ohne_makler: 0.07
  nk_mit_makler: 0.1057

# Scoring-Gewichte (max 100 Punkte)
scoring:
  rendite_normal: 35
  rendite_wg: 25
  preis_pro_zimmer: 20
  lage: 10
  leerstand: 5
  wg_geeignet: 5

# Bevorzugte Stadtteile Freiburg
gute_stadtteile:
  - "Wiehre"
  - "Herdern"
  - "Stuehlinger"
  - "Zähringen"
  - "Guenterstal"
  - "Littenweiler"
  - "Kirchzarten"
  - "Merzhausen"
  - "Gundelfingen"
  - "Staufen"
  - "Bad Krozingen"
  - "Breisach"

# SMS Benachrichtigung
notification:
  hour_utc: 14
  minute_utc: 30
  max_listings_in_sms: 5
  min_score_for_sms: 30

# Plattformen
platforms:
  immoscout:
    enabled: true
    max_pages: 5
  immowelt:
    enabled: true
    max_pages: 3
  kleinanzeigen:
    enabled: true
    max_pages: 3
